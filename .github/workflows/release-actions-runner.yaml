name: Release Actions Runner

on:
  push:
    branches: ["main"]
    paths:
      - "apps/actions-runner/**"
      - "!apps/actions-runner/metadata.yaml"
      - "!apps/actions-runner/README.md"
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/image-build-action.yaml
    permissions:
      contents: read
      packages: write
    with:
      app: actions-runner
      version: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.event_name == 'push' }}
      release: ${{ github.event_name == 'workflow_dispatch' && inputs.release || github.event_name == 'push' }}
